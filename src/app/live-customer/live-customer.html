@if (customer(); as c) {
  <div>
    <p [class.flash]="isChanged('name')">
      Name: {{ c.name }}
    </p>

    <p [class.flash]="isChanged('price')">
      Price: {{ c.price }}
    </p>

    <p [class.flash]="isChanged('quantity')">
      Quantity: {{ c.quantity }}
    </p>

    <p [class.flash]="isChanged('status')">
      Status: {{ c.status }}
    </p>

    <td [class.changed-cell]="isChanged('quantity')">
      {{ c.quantity }}
    </td>

    <td
      [class.value-up]="getDirection('price') === 'up'"
      [class.value-down]="getDirection('price') === 'down'"
      >
        {{ c.price }}
    </td>

    <td
      [class.changed-cell]="isChanged('price')"
      [class.fade-out]="isFading('price')"
      >
        {{ c.price }}
    </td>
  </div>
}
